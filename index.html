<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPINREC — Recomendações de Álbuns</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8c84a;
    --accent2: #e85a4a;
    --text: #f0ece0;
    --muted: #6a6560;
    --success: #4ae89a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── GRAIN OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    opacity: .028;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 150px;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 clamp(16px, 4vw, 60px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    background: rgba(13,13,13,.92);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2rem;
    letter-spacing: .12em;
    color: var(--accent);
    line-height: 1;
  }

  .logo span { color: var(--text); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: .72rem;
    color: var(--muted);
    letter-spacing: .06em;
  }

  .history-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: .72rem;
    letter-spacing: .08em;
    padding: 6px 14px;
    cursor: pointer;
    transition: border-color .2s, color .2s;
    text-transform: uppercase;
  }

  .history-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── HERO ── */
  .hero {
    padding: clamp(40px, 8vw, 100px) clamp(16px, 4vw, 60px) 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    align-items: start;
    max-width: 1400px;
    margin: 0 auto;
  }

  @media (max-width: 768px) {
    .hero { grid-template-columns: 1fr; }
  }

  .hero-text h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2.4rem, 5vw, 4.5rem);
    line-height: 1.08;
    font-weight: 400;
    margin-bottom: 16px;
  }

  .hero-text h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .hero-text p {
    font-size: .82rem;
    color: var(--muted);
    line-height: 1.7;
    max-width: 380px;
    letter-spacing: .02em;
  }

  .stat-row {
    display: flex;
    gap: 32px;
    margin-top: 32px;
  }

  .stat { display: flex; flex-direction: column; gap: 4px; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--accent); line-height: 1; }
  .stat-label { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }

  /* ── FILTERS PANEL ── */
  .filters-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .filter-group label {
    display: block;
    font-size: .65rem;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip {
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: .7rem;
    padding: 5px 10px;
    cursor: pointer;
    letter-spacing: .04em;
    transition: all .15s;
    white-space: nowrap;
  }

  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active { border-color: var(--accent); background: var(--accent); color: #000; }
  .chip.active-genre { border-color: #7dcfff; background: #7dcfff22; color: #7dcfff; }

  .spin-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: .14em;
    padding: 16px;
    cursor: pointer;
    transition: background .15s, transform .1s;
    margin-top: 4px;
    position: relative;
    overflow: hidden;
  }

  .spin-btn:hover { background: #f0d050; }
  .spin-btn:active { transform: scale(.98); }

  .spin-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,.15) 50%, transparent 60%);
    transform: translateX(-100%);
    transition: transform .4s;
  }

  .spin-btn:hover::before { transform: translateX(100%); }

  /* ── MAIN CONTENT ── */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: clamp(40px, 6vw, 80px) clamp(16px, 4vw, 60px);
  }

  /* ── RESULT CARD ── */
  #result-section { animation: fadeUp .4s ease both; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .section-label {
    font-size: .65rem;
    text-transform: uppercase;
    letter-spacing: .14em;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .album-card {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px;
    position: relative;
    overflow: hidden;
  }

  .album-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .cover-wrap {
    position: relative;
    width: clamp(140px, 18vw, 220px);
    flex-shrink: 0;
  }

  .cover-wrap img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
    filter: saturate(.9);
  }

  .type-badge {
    position: absolute;
    top: 8px; right: 8px;
    background: #000;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-size: .6rem;
    padding: 3px 7px;
    letter-spacing: .1em;
    text-transform: uppercase;
  }

  .album-info {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 140px;
  }

  .album-info-top { display: flex; flex-direction: column; gap: 6px; }

  .album-genre {
    font-size: .65rem;
    text-transform: uppercase;
    letter-spacing: .14em;
    color: var(--accent);
  }

  .album-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.6rem, 3.5vw, 2.8rem);
    font-weight: 400;
    line-height: 1.1;
  }

  .album-artist {
    font-size: .9rem;
    color: var(--muted);
    letter-spacing: .04em;
  }

  .album-meta {
    display: flex;
    gap: 20px;
    font-size: .72rem;
    color: var(--muted);
    margin-top: 12px;
  }

  .album-meta span { display: flex; align-items: center; gap: 6px; }

  .album-meta .dot { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; }

  .album-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
  }

  .btn-mark {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: .72rem;
    padding: 8px 16px;
    cursor: pointer;
    letter-spacing: .06em;
    text-transform: uppercase;
    transition: all .15s;
  }

  .btn-mark:hover { border-color: var(--success); color: var(--success); }
  .btn-mark.marked { border-color: var(--success); background: #4ae89a22; color: var(--success); }

  .btn-spin-again {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: .72rem;
    padding: 8px 16px;
    cursor: pointer;
    letter-spacing: .06em;
    text-transform: uppercase;
    transition: all .15s;
  }

  .btn-spin-again:hover { background: var(--accent); color: #000; }

  /* ── STAR RATING ── */
  .star-wrap {
    display: flex;
    gap: 4px;
    margin-top: 16px;
  }

  .star {
    font-size: 1.4rem;
    cursor: pointer;
    color: var(--border);
    transition: color .1s, transform .1s;
    line-height: 1;
  }

  .star:hover, .star.lit { color: var(--accent); }
  .star:hover { transform: scale(1.2); }

  .rating-label {
    font-size: .65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
    margin-top: 8px;
  }

  /* ── HISTORY ── */
  #history-section { display: none; }
  #history-section.open { display: block; animation: fadeUp .3s ease both; }

  .history-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
    margin-top: 20px;
  }

  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0;
    cursor: pointer;
    transition: border-color .2s, transform .2s;
    position: relative;
  }

  .history-item:hover { border-color: var(--accent); transform: translateY(-3px); }

  .history-item img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
    filter: saturate(.8);
  }

  .history-meta { padding: 10px; }

  .history-title {
    font-size: .75rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .history-artist {
    font-size: .65rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-stars {
    display: flex;
    gap: 2px;
    margin-top: 6px;
  }

  .history-stars span { font-size: .75rem; color: var(--accent); }
  .history-stars span.empty { color: var(--border); }

  .empty-history {
    color: var(--muted);
    font-size: .8rem;
    padding: 40px 0;
    text-align: center;
    letter-spacing: .06em;
  }

  .clear-history-btn {
    background: none;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    font-family: 'DM Mono', monospace;
    font-size: .7rem;
    padding: 6px 14px;
    cursor: pointer;
    letter-spacing: .08em;
    text-transform: uppercase;
    transition: all .15s;
    margin-left: auto;
    display: block;
    margin-top: 16px;
  }

  .clear-history-btn:hover { background: var(--accent2); color: #fff; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .album-card { grid-template-columns: 1fr; }
    .cover-wrap { width: 100%; max-width: 260px; }
    .stat-row { gap: 20px; }
  }

  /* ── DIVIDER ── */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 40px 0;
  }

  /* ── NO RESULT ── */
  .no-result {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 40px;
    text-align: center;
    color: var(--muted);
    font-size: .85rem;
    letter-spacing: .04em;
    line-height: 1.8;
  }

  /* ── TOOLTIP ── */
  .tooltip-wrap { position: relative; display: inline-block; }
  .tooltip {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: .65rem;
    padding: 4px 10px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity .15s;
    letter-spacing: .06em;
  }
  .tooltip-wrap:hover .tooltip { opacity: 1; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">SPIN<span>REC</span></div>
  <div class="header-right">
    <span id="listened-count">0 escutados</span>
    <button class="history-btn" onclick="toggleHistory()">Histórico</button>
  </div>
</header>

<section class="hero">
  <div class="hero-text">
    <h1>Descubra seu<br>próximo <em>álbum</em><br>favorito.</h1>
    <p>Selecione gênero, duração e seu humor. O SPINREC escolhe o disco perfeito para você.</p>
    <div class="stat-row">
      <div class="stat"><span class="stat-num">300</span><span class="stat-label">Álbuns</span></div>
      <div class="stat"><span class="stat-num">28</span><span class="stat-label">Gêneros</span></div>
      <div class="stat"><span class="stat-num" id="stat-listened">0</span><span class="stat-label">Escutados</span></div>
    </div>
  </div>

  <div class="filters-panel">
    <!-- GENRE -->
    <div class="filter-group">
      <label>Gênero Musical</label>
      <div class="chips" id="genre-chips">
        <button class="chip active" data-val="" onclick="selectGenre(this)">🎲 Aleatório</button>
      </div>
    </div>

    <!-- DURATION -->
    <div class="filter-group">
      <label>Duração máxima</label>
      <div class="chips">
        <button class="chip active" data-val="0"   onclick="selectDuration(this)">Qualquer</button>
        <button class="chip" data-val="30"  onclick="selectDuration(this)">≤ 30 min</button>
        <button class="chip" data-val="40"  onclick="selectDuration(this)">≤ 40 min</button>
        <button class="chip" data-val="50"  onclick="selectDuration(this)">≤ 50 min</button>
        <button class="chip" data-val="60"  onclick="selectDuration(this)">≤ 60 min</button>
        <button class="chip" data-val="999" onclick="selectDuration(this)">60+ min</button>
      </div>
    </div>

    <!-- TYPE -->
    <div class="filter-group">
      <label>Formato</label>
      <div class="chips">
        <button class="chip active" data-val=""      onclick="selectType(this)">Todos</button>
        <button class="chip"        data-val="album" onclick="selectType(this)">Álbum</button>
        <button class="chip"        data-val="EP"    onclick="selectType(this)">EP</button>
      </div>
    </div>

    <!-- ERA -->
    <div class="filter-group">
      <label>Época</label>
      <div class="chips">
        <button class="chip active" data-val="0,9999" onclick="selectEra(this)">Qualquer</button>
        <button class="chip" data-val="1950,1969" onclick="selectEra(this)">50s–60s</button>
        <button class="chip" data-val="1970,1979" onclick="selectEra(this)">70s</button>
        <button class="chip" data-val="1980,1989" onclick="selectEra(this)">80s</button>
        <button class="chip" data-val="1990,1999" onclick="selectEra(this)">90s</button>
        <button class="chip" data-val="2000,2009" onclick="selectEra(this)">2000s</button>
        <button class="chip" data-val="2010,2024" onclick="selectEra(this)">2010s+</button>
      </div>
    </div>

    <!-- EXCLUDE LISTENED -->
    <div class="filter-group">
      <label>Opções</label>
      <div class="chips">
        <button class="chip" id="exclude-chip" data-val="false" onclick="toggleExclude(this)">Excluir já escutados</button>
      </div>
    </div>

    <button class="spin-btn" onclick="spin()">⟳ &nbsp; GIRAR O DISCO</button>
  </div>
</section>

<main class="main">
  <!-- RESULT -->
  <div id="result-section" style="display:none">
    <p class="section-label">Recomendação</p>
    <div id="album-card-wrap"></div>
  </div>

  <hr class="divider" id="history-divider" style="display:none">

  <!-- HISTORY -->
  <div id="history-section">
    <p class="section-label" style="display:flex;justify-content:space-between;align-items:center">
      <span>Histórico de escutas</span>
    </p>
    <div id="history-grid" class="history-grid"></div>
    <button class="clear-history-btn" onclick="clearHistory()">Limpar histórico</button>
  </div>
</main>

<script>

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let state = {
  genre: '',
  duration: 0,
  type: '',
  era: [0, 9999],
  excludeListened: false,
  currentAlbum: null,
};

// localStorage keys
const LS_HISTORY = 'spinrec_history'; // { id: { rating, date } }

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(LS_HISTORY)) || {}; }
  catch { return {}; }
}

function saveHistory(h) {
  localStorage.setItem(LS_HISTORY, JSON.stringify(h));
}

// ── BUILD GENRE CHIPS ──
(function buildGenreChips() {
  const genres = [...new Set(ALBUMS.map(a => a.genre))].sort();
  const wrap = document.getElementById('genre-chips');
  genres.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.dataset.val = g;
    btn.textContent = g;
    btn.onclick = function(){ selectGenre(this); };
    wrap.appendChild(btn);
  });
})();

// ── FILTER HELPERS ──
function selectGenre(el) {
  document.querySelectorAll('#genre-chips .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  state.genre = el.dataset.val;
}

function selectDuration(el) {
  el.closest('.chips').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  state.duration = parseInt(el.dataset.val);
}

function selectType(el) {
  el.closest('.chips').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  state.type = el.dataset.val;
}

function selectEra(el) {
  el.closest('.chips').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  const parts = el.dataset.val.split(',').map(Number);
  state.era = parts;
}

function toggleExclude(el) {
  state.excludeListened = !state.excludeListened;
  el.classList.toggle('active', state.excludeListened);
}

// ── SPIN ──
function spin() {
  const history = loadHistory();
  const listenedIds = new Set(Object.keys(history).map(Number));

  let pool = ALBUMS.filter(a => {
    if (state.genre && a.genre !== state.genre) return false;
    if (state.type && a.type !== state.type) return false;
    if (state.duration === 999 && a.duration <= 60) return false;
    if (state.duration > 0 && state.duration < 999 && a.duration > state.duration) return false;
    if (a.year < state.era[0] || a.year > state.era[1]) return false;
    if (state.excludeListened && listenedIds.has(a.id)) return false;
    return true;
  });

  // Avoid same album twice in a row
  if (pool.length > 1 && state.currentAlbum) {
    pool = pool.filter(a => a.id !== state.currentAlbum.id);
  }

  if (pool.length === 0) {
    showNoResult();
    return;
  }

  const album = pool[Math.floor(Math.random() * pool.length)];
  state.currentAlbum = album;
  renderCard(album);
}

function showNoResult() {
  const wrap = document.getElementById('album-card-wrap');
  wrap.innerHTML = `<div class="no-result">Nenhum álbum encontrado com esses filtros.<br>Tente ampliar as opções.</div>`;
  document.getElementById('result-section').style.display = 'block';
}

// ── RENDER CARD ──
function renderCard(album) {
  const history = loadHistory();
  const entry = history[album.id];
  const isListened = !!entry;
  const rating = entry ? entry.rating : 0;

  const stars = [1,2,3,4,5].map(n =>
    `<span class="star ${n <= rating ? 'lit' : ''}" onclick="rateCurrent(${n})" title="${n} estrela${n>1?'s':''}"">★</span>`
  ).join('');

  const dur = album.duration;
  const durStr = `${Math.floor(dur/60) > 0 ? Math.floor(dur/60)+'h ' : ''}${dur%60}min`;

  const html = `
    <div class="album-card" id="main-album-card">
      <div class="cover-wrap">
        <img src="${album.cover}" alt="${album.title}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'300\\' height=\\'300\\'><rect width=\\'300\\' height=\\'300\\' fill=\\'%231a1a1a\\'/><text x=\\'50%\\' y=\\'50%\\' fill=\\'%23555\\' font-size=\\'14\\' text-anchor=\\'middle\\' dy=\\'.35em\\'>sem capa</text></svg>'">
        <span class="type-badge">${album.type.toUpperCase()}</span>
      </div>
      <div class="album-info">
        <div class="album-info-top">
          <span class="album-genre">${album.genre}</span>
          <h2 class="album-title">${album.title}</h2>
          <p class="album-artist">${album.artist}</p>
          <div class="album-meta">
            <span><span class="dot"></span>${album.year}</span>
            <span><span class="dot"></span>${durStr}</span>
          </div>
        </div>
        <div>
          <div class="rating-label">Sua avaliação</div>
          <div class="star-wrap" id="star-wrap">${stars}</div>
          <div class="album-actions">
            <button class="btn-mark ${isListened ? 'marked' : ''}" id="mark-btn" onclick="toggleListened()">
              ${isListened ? '✓ Escutado' : '+ Marcar como escutado'}
            </button>
            <button class="btn-spin-again" onclick="spin()">↺ Outro disco</button>
          </div>
        </div>
      </div>
    </div>
  `;

  const section = document.getElementById('result-section');
  section.style.display = 'block';
  section.style.animation = 'none';
  section.offsetHeight; // reflow
  section.style.animation = '';
  document.getElementById('album-card-wrap').innerHTML = html;
  section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── RATE ──
function rateCurrent(n) {
  if (!state.currentAlbum) return;
  const history = loadHistory();
  if (!history[state.currentAlbum.id]) {
    history[state.currentAlbum.id] = { date: new Date().toISOString() };
    document.getElementById('mark-btn').textContent = '✓ Escutado';
    document.getElementById('mark-btn').classList.add('marked');
  }
  history[state.currentAlbum.id].rating = n;
  saveHistory(history);
  // Update stars
  document.querySelectorAll('#star-wrap .star').forEach((s, i) => {
    s.classList.toggle('lit', i < n);
  });
  updateCounts();
  refreshHistory();
}

// ── TOGGLE LISTENED ──
function toggleListened() {
  if (!state.currentAlbum) return;
  const history = loadHistory();
  const btn = document.getElementById('mark-btn');
  if (history[state.currentAlbum.id]) {
    delete history[state.currentAlbum.id];
    btn.textContent = '+ Marcar como escutado';
    btn.classList.remove('marked');
  } else {
    history[state.currentAlbum.id] = { date: new Date().toISOString(), rating: 0 };
    btn.textContent = '✓ Escutado';
    btn.classList.add('marked');
  }
  saveHistory(history);
  updateCounts();
  refreshHistory();
}

// ── HISTORY ──
function toggleHistory() {
  const sec = document.getElementById('history-section');
  const div = document.getElementById('history-divider');
  const open = sec.classList.toggle('open');
  div.style.display = open ? 'block' : 'none';
  if (open) {
    refreshHistory();
    sec.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function refreshHistory() {
  const history = loadHistory();
  const grid = document.getElementById('history-grid');
  const ids = Object.keys(history).map(Number);

  if (ids.length === 0) {
    grid.innerHTML = '<p class="empty-history">Nenhum álbum escutado ainda.<br>Gire o disco e marque o que você ouvir.</p>';
    return;
  }

  // Sort by date desc
  ids.sort((a, b) => {
    const da = history[a]?.date || '';
    const db = history[b]?.date || '';
    return db.localeCompare(da);
  });

  grid.innerHTML = ids.map(id => {
    const album = ALBUMS.find(a => a.id === id);
    if (!album) return '';
    const r = history[id]?.rating || 0;
    const stars = [1,2,3,4,5].map(n =>
      `<span class="${n <= r ? '' : 'empty'}">★</span>`
    ).join('');
    return `
      <div class="history-item" onclick="loadAlbum(${id})" title="${album.title} — ${album.artist}">
        <img src="${album.cover}" alt="${album.title}" loading="lazy">
        <div class="history-meta">
          <div class="history-title">${album.title}</div>
          <div class="history-artist">${album.artist}</div>
          <div class="history-stars">${stars}</div>
        </div>
      </div>
    `;
  }).join('');
}

function loadAlbum(id) {
  const album = ALBUMS.find(a => a.id === id);
  if (!album) return;
  state.currentAlbum = album;
  renderCard(album);
  document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
}

function clearHistory() {
  if (!confirm('Apagar todo o histórico?')) return;
  localStorage.removeItem(LS_HISTORY);
  updateCounts();
  refreshHistory();
}

function updateCounts() {
  const n = Object.keys(loadHistory()).length;
  document.getElementById('listened-count').textContent = n + ' escutados';
  document.getElementById('stat-listened').textContent = n;
}

// ── INIT ──
updateCounts();
</script>
</body>

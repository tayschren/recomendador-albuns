<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPINREC — Descubra Álbuns</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --surface: #141414;
  --surface2: #1c1c1c;
  --border: #2a2a2a;
  --accent: #e8c84a;
  --accent2: #e85a4a;
  --text: #f0ece0;
  --muted: #6a6560;
  --success: #4ae89a;
  --info: #7dcfff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

/* GRAIN */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: .032;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 160px;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── HEADER ── */
header {
  border-bottom: 1px solid var(--border);
  padding: 0 clamp(16px, 4vw, 60px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  position: sticky;
  top: 0;
  background: rgba(13,13,13,.93);
  backdrop-filter: blur(14px);
  z-index: 200;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  letter-spacing: .12em;
  color: var(--accent);
  line-height: 1;
  user-select: none;
}
.logo span { color: var(--text); }

.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.header-badge {
  font-size: .68rem;
  color: var(--muted);
  letter-spacing: .08em;
}

.header-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  letter-spacing: .09em;
  padding: 6px 14px;
  cursor: pointer;
  transition: border-color .2s, color .2s;
  text-transform: uppercase;
}
.header-btn:hover { border-color: var(--accent); color: var(--accent); }
.header-btn.active { border-color: var(--accent); color: var(--accent); }

/* ── HERO ── */
.hero {
  padding: clamp(32px, 7vw, 90px) clamp(16px, 4vw, 60px) 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
  max-width: 1400px;
  margin: 0 auto;
}

@media (max-width: 800px) {
  .hero { grid-template-columns: 1fr; }
}

.hero-text h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(2.2rem, 5vw, 4.2rem);
  line-height: 1.08;
  font-weight: 400;
  margin-bottom: 14px;
}
.hero-text h1 em { font-style: italic; color: var(--accent); }

.hero-text p {
  font-size: .8rem;
  color: var(--muted);
  line-height: 1.8;
  max-width: 360px;
  letter-spacing: .02em;
}

.stat-row {
  display: flex;
  gap: 28px;
  margin-top: 28px;
  flex-wrap: wrap;
}
.stat { display: flex; flex-direction: column; gap: 3px; }
.stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.9rem; color: var(--accent); line-height: 1; }
.stat-label { font-size: .62rem; color: var(--muted); text-transform: uppercase; letter-spacing: .11em; }

/* ── FILTERS PANEL ── */
.filters-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 26px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  position: relative;
}

.filters-panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2), var(--info));
}

.filter-group label {
  display: block;
  font-size: .62rem;
  text-transform: uppercase;
  letter-spacing: .13em;
  color: var(--muted);
  margin-bottom: 9px;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.chip {
  border: 1px solid var(--border);
  background: none;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  padding: 5px 10px;
  cursor: pointer;
  letter-spacing: .04em;
  transition: all .14s;
  white-space: nowrap;
}
.chip:hover { border-color: var(--accent); color: var(--text); }
.chip.active { border-color: var(--accent); background: var(--accent); color: #000; font-weight: 500; }

/* GENRE SEARCH */
.genre-search-wrap {
  position: relative;
  margin-bottom: 8px;
}
.genre-search {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: .72rem;
  padding: 7px 12px;
  outline: none;
  letter-spacing: .04em;
  transition: border-color .15s;
}
.genre-search:focus { border-color: var(--accent); }
.genre-search::placeholder { color: var(--muted); }

/* SPIN BTN */
.spin-btn {
  width: 100%;
  background: var(--accent);
  border: none;
  color: #000;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: .16em;
  padding: 16px;
  cursor: pointer;
  transition: background .14s, transform .1s;
  position: relative;
  overflow: hidden;
}
.spin-btn:hover { background: #f0d050; }
.spin-btn:active { transform: scale(.98); }
.spin-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,.16) 50%, transparent 60%);
  transform: translateX(-100%);
  transition: transform .45s;
}
.spin-btn:hover::before { transform: translateX(100%); }
.spin-btn:disabled { opacity: .5; cursor: not-allowed; }

/* ── MAIN ── */
.main {
  max-width: 1400px;
  margin: 0 auto;
  padding: clamp(36px, 6vw, 72px) clamp(16px, 4vw, 60px);
}

.section-label {
  font-size: .62rem;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--muted);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── ALBUM CARD ── */
#result-section { display: none; animation: fadeUp .4s ease both; }
#result-section.visible { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.album-card {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 30px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 26px;
  position: relative;
  overflow: hidden;
  transition: border-color .2s;
}
.album-card:hover { border-color: #3a3a3a; }
.album-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}

@media (max-width: 600px) {
  .album-card { grid-template-columns: 1fr; }
}

.cover-wrap {
  position: relative;
  width: clamp(130px, 16vw, 210px);
  flex-shrink: 0;
}
.cover-wrap img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  display: block;
  filter: saturate(.88);
  transition: filter .3s;
}
.cover-wrap:hover img { filter: saturate(1.05); }

.vinyl-shadow {
  position: absolute;
  top: 8%; right: -18%;
  width: 84%;
  aspect-ratio: 1;
  border-radius: 50%;
  background: radial-gradient(circle, #222 30%, #111 70%, #000 100%);
  z-index: -1;
  opacity: .7;
  transition: right .3s ease;
}
.album-card:hover .vinyl-shadow { right: -22%; }

.type-badge {
  position: absolute;
  top: 8px; left: 8px;
  background: #000;
  border: 1px solid var(--accent);
  color: var(--accent);
  font-size: .58rem;
  padding: 3px 7px;
  letter-spacing: .1em;
  text-transform: uppercase;
}

.album-info {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-height: 140px;
}
.album-info-top { display: flex; flex-direction: column; gap: 5px; }

.album-genre {
  font-size: .62rem;
  text-transform: uppercase;
  letter-spacing: .15em;
  color: var(--accent);
}

.album-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(1.5rem, 3.2vw, 2.6rem);
  font-weight: 400;
  line-height: 1.1;
}

.album-artist {
  font-size: .86rem;
  color: var(--muted);
  letter-spacing: .04em;
}

.album-meta {
  display: flex;
  gap: 18px;
  font-size: .7rem;
  color: var(--muted);
  margin-top: 10px;
  flex-wrap: wrap;
}
.album-meta span { display: flex; align-items: center; gap: 5px; }
.dot { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; flex-shrink: 0; }

/* ── HALF-STAR RATING ── */
.rating-section { margin-top: 18px; }
.rating-label-text {
  font-size: .6rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .1em;
  margin-bottom: 8px;
}

.stars-container {
  display: flex;
  gap: 2px;
  align-items: center;
}

.star-unit {
  position: relative;
  width: 28px;
  height: 28px;
  cursor: pointer;
  font-size: 1.6rem;
  line-height: 1;
}

.star-unit .star-bg {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--border);
  font-size: 1.55rem;
  pointer-events: none;
  transition: color .1s;
}

.star-unit .star-left,
.star-unit .star-right {
  position: absolute;
  top: 0;
  width: 50%;
  height: 100%;
  z-index: 2;
}
.star-unit .star-left { left: 0; }
.star-unit .star-right { right: 0; }

.star-filled-left,
.star-filled-right {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.55rem;
  color: var(--accent);
  overflow: hidden;
  pointer-events: none;
  opacity: 0;
  transition: opacity .1s;
}
.star-filled-left { clip-path: inset(0 50% 0 0); }
.star-filled-right { clip-path: inset(0 0 0 50%); }

.star-unit.half .star-filled-left { opacity: 1; }
.star-unit.full .star-filled-left { opacity: 1; }
.star-unit.full .star-filled-right { opacity: 1; }

.star-unit:hover .star-bg { color: #3a3835; }

.rating-value-display {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  color: var(--accent);
  margin-left: 10px;
  min-width: 36px;
}

/* ── ACTIONS ── */
.album-actions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  flex-wrap: wrap;
}

.btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: .7rem;
  padding: 8px 14px;
  cursor: pointer;
  letter-spacing: .06em;
  text-transform: uppercase;
  transition: all .14s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { border-color: var(--text); }

.btn-listen { border-color: var(--success); color: var(--success); }
.btn-listen:hover { background: var(--success); color: #000; border-color: var(--success); }
.btn-listen.marked { background: #4ae89a22; }

.btn-spotify { border-color: #1DB954; color: #1DB954; }
.btn-spotify:hover { background: #1DB954; color: #000; border-color: #1DB954; }

.btn-again { border-color: var(--accent); color: var(--accent); }
.btn-again:hover { background: var(--accent); color: #000; }

/* ── TRACK LIST ── */
.tracklist-section {
  margin-top: 24px;
  border-top: 1px solid var(--border);
  padding-top: 20px;
}
.tracklist-toggle {
  background: none;
  border: none;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: .7rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}
.tracklist-toggle:hover { color: var(--text); }
.tracklist-toggle .arrow { transition: transform .2s; display: inline-block; }
.tracklist-toggle.open .arrow { transform: rotate(90deg); }

.track-list { display: none; }
.track-list.open { display: block; }

.track-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
  font-size: .72rem;
}
.track-row:last-child { border-bottom: none; }
.track-num { color: var(--muted); width: 22px; text-align: right; flex-shrink: 0; }
.track-name { flex: 1; }
.track-dur { color: var(--muted); flex-shrink: 0; }

/* ── LOADING ── */
.spinner {
  display: none;
  width: 32px;
  height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 40px auto;
}
.spinner.active { display: block; }

@keyframes spin {
  to { transform: rotate(360deg); }
}

.loading-text {
  text-align: center;
  color: var(--muted);
  font-size: .75rem;
  letter-spacing: .06em;
  display: none;
}
.loading-text.active { display: block; }

/* ── ERROR / EMPTY ── */
.notice {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 36px;
  text-align: center;
  color: var(--muted);
  font-size: .82rem;
  letter-spacing: .04em;
  line-height: 1.8;
}
.notice strong { color: var(--accent2); }

/* ── DIVIDER ── */
hr.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 48px 0;
}

/* ── HISTORY ── */
#history-section { display: none; }
#history-section.open { display: block; animation: fadeUp .3s ease both; }

.history-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.clear-btn {
  background: none;
  border: 1px solid var(--accent2);
  color: var(--accent2);
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  padding: 5px 12px;
  cursor: pointer;
  letter-spacing: .08em;
  text-transform: uppercase;
  transition: all .14s;
}
.clear-btn:hover { background: var(--accent2); color: #fff; }

.history-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 14px;
}

.history-item {
  background: var(--surface);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color .18s, transform .18s;
  position: relative;
  overflow: hidden;
}
.history-item:hover { border-color: var(--accent); transform: translateY(-3px); }

.history-item img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  display: block;
  filter: saturate(.8);
  transition: filter .2s;
}
.history-item:hover img { filter: saturate(1); }

.history-meta { padding: 9px 10px; }
.history-title {
  font-size: .72rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 3px;
}
.history-artist {
  font-size: .62rem;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 6px;
}
.history-stars-row {
  display: flex;
  align-items: center;
  gap: 2px;
}
.h-star { font-size: .8rem; color: var(--accent); }
.h-star.empty { color: var(--border); }
.h-star.half-star { 
  position: relative;
  font-size: .8rem;
  display: inline-block;
}

.listened-badge {
  position: absolute;
  top: 6px; right: 6px;
  background: var(--success);
  color: #000;
  font-size: .55rem;
  padding: 2px 5px;
  letter-spacing: .06em;
  text-transform: uppercase;
}

.empty-state {
  color: var(--muted);
  font-size: .78rem;
  padding: 44px 0;
  text-align: center;
  letter-spacing: .06em;
  grid-column: 1 / -1;
}

/* ── TOOLTIP ── */
[data-tip] {
  position: relative;
}
[data-tip]::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: #222;
  border: 1px solid var(--border);
  color: var(--text);
  font-size: .62rem;
  padding: 4px 10px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity .14s;
  letter-spacing: .06em;
  z-index: 50;
}
[data-tip]:hover::after { opacity: 1; }

/* Spotify green pulse */
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(29,185,84,0); }
  50%      { box-shadow: 0 0 0 6px rgba(29,185,84,.18); }
}
.spotify-pulse { animation: pulse 2s ease-in-out infinite; }

</style>
</head>
<body>

<header>
  <div class="logo">SPIN<span>REC</span></div>
  <div class="header-right">
    <span class="header-badge" id="listened-badge">0 escutados</span>
    <button class="header-btn" id="history-toggle-btn" onclick="toggleHistory()">Histórico</button>
  </div>
</header>

<!-- ═══════════════ HERO ═══════════════ -->
<section class="hero">
  <div class="hero-text">
    <h1>Descubra seu<br>próximo <em>álbum</em><br>favorito.</h1>
    <p>Selecione gênero, duração e humor. O SPINREC usa o Spotify para encontrar o disco perfeito — com tracklist, duração real e avaliação por estrelas.</p>
    <div class="stat-row">
      <div class="stat"><span class="stat-num" id="stat-total">∞</span><span class="stat-label">Álbuns</span></div>
      <div class="stat"><span class="stat-num" id="stat-spins">0</span><span class="stat-label">Giros</span></div>
      <div class="stat"><span class="stat-num" id="stat-listened">0</span><span class="stat-label">Escutados</span></div>
    </div>
  </div>

  <div class="filters-panel">

    <!-- GENRE -->
    <div class="filter-group">
      <label>Gênero Musical</label>
      <div class="genre-search-wrap">
        <input class="genre-search" id="genre-search" type="text" placeholder="Buscar gênero..." oninput="filterGenreChips(this.value)">
      </div>
      <div class="chips" id="genre-chips">
        <!-- populated by JS -->
      </div>
    </div>

    <!-- DURATION -->
    <div class="filter-group">
      <label>Duração máxima</label>
      <div class="chips" id="dur-chips">
        <button class="chip active" data-min="0"   data-max="9999" onclick="selectChip(this,'dur')">Qualquer</button>
        <button class="chip" data-min="0"   data-max="20"  onclick="selectChip(this,'dur')">≤ 20 min</button>
        <button class="chip" data-min="0"   data-max="30"  onclick="selectChip(this,'dur')">≤ 30 min</button>
        <button class="chip" data-min="0"   data-max="40"  onclick="selectChip(this,'dur')">≤ 40 min</button>
        <button class="chip" data-min="0"   data-max="50"  onclick="selectChip(this,'dur')">≤ 50 min</button>
        <button class="chip" data-min="0"   data-max="60"  onclick="selectChip(this,'dur')">≤ 60 min</button>
        <button class="chip" data-min="61"  data-max="9999" onclick="selectChip(this,'dur')">60+ min</button>
      </div>
    </div>

    <!-- TYPE -->
    <div class="filter-group">
      <label>Formato</label>
      <div class="chips" id="type-chips">
        <button class="chip active" data-val=""       onclick="selectChip(this,'type')">Todos</button>
        <button class="chip"        data-val="album"  onclick="selectChip(this,'type')">Álbum</button>
        <button class="chip"        data-val="single" onclick="selectChip(this,'type')">EP / Single</button>
      </div>
    </div>

    <!-- ERA -->
    <div class="filter-group">
      <label>Época</label>
      <div class="chips" id="era-chips">
        <button class="chip active" data-from="1900" data-to="2099" onclick="selectChip(this,'era')">Qualquer</button>
        <button class="chip" data-from="1950" data-to="1969" onclick="selectChip(this,'era')">50s–60s</button>
        <button class="chip" data-from="1970" data-to="1979" onclick="selectChip(this,'era')">70s</button>
        <button class="chip" data-from="1980" data-to="1989" onclick="selectChip(this,'era')">80s</button>
        <button class="chip" data-from="1990" data-to="1999" onclick="selectChip(this,'era')">90s</button>
        <button class="chip" data-from="2000" data-to="2009" onclick="selectChip(this,'era')">2000s</button>
        <button class="chip" data-from="2010" data-to="2019" onclick="selectChip(this,'era')">2010s</button>
        <button class="chip" data-from="2020" data-to="2099" onclick="selectChip(this,'era')">2020s+</button>
      </div>
    </div>

    <!-- OPTIONS -->
    <div class="filter-group">
      <label>Opções</label>
      <div class="chips">
        <button class="chip" id="exclude-chip" onclick="toggleExclude(this)">Excluir já escutados</button>
        <button class="chip" id="popular-chip" onclick="toggleChipToggle(this,'popular')">Mais populares</button>
      </div>
    </div>

    <button class="spin-btn" id="spin-btn" onclick="spin()">⟳ &nbsp; GIRAR O DISCO</button>
  </div>
</section>

<!-- ═══════════════ MAIN ═══════════════ -->
<main class="main">

  <!-- LOADING -->
  <div id="loading-wrap" style="display:none">
    <div class="spinner active"></div>
    <p class="loading-text active" id="loading-text">Consultando Spotify…</p>
  </div>

  <!-- RESULT -->
  <div id="result-section">
    <p class="section-label">Recomendação</p>
    <div id="album-card-wrap"></div>
  </div>

  <hr class="divider" id="div1" style="display:none">

  <!-- HISTORY -->
  <div id="history-section">
    <div class="history-header">
      <p class="section-label" style="margin-bottom:0;flex:1">Histórico de escutas</p>
      <button class="clear-btn" onclick="clearHistory()">Limpar tudo</button>
    </div>
    <div class="history-grid" id="history-grid"></div>
  </div>

</main>

<script>
// ═══════════════════════════════════════════════════
//  SPOTIFY CONFIG
// ═══════════════════════════════════════════════════
const SPOTIFY_CLIENT_ID     = '1f4a9b64bd104af5a61fb610dffa78cd';
const SPOTIFY_CLIENT_SECRET = '0338dc30aef44b77ad3565673244002d';
let spotifyToken = null;
let tokenExpiry  = 0;

async function getToken() {
  if (spotifyToken && Date.now() < tokenExpiry) return spotifyToken;
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded',
      'Authorization': 'Basic ' + btoa(SPOTIFY_CLIENT_ID + ':' + SPOTIFY_CLIENT_SECRET)
    },
    body: 'grant_type=client_credentials'
  });
  const d = await res.json();
  spotifyToken = d.access_token;
  tokenExpiry  = Date.now() + (d.expires_in - 60) * 1000;
  return spotifyToken;
}

async function spotifyFetch(path) {
  const token = await getToken();
  const res = await fetch('https://api.spotify.com/v1' + path, {
    headers: { Authorization: 'Bearer ' + token }
  });
  if (!res.ok) throw new Error(`Spotify ${res.status}`);
  return res.json();
}

// ═══════════════════════════════════════════════════
//  GENRES
// ═══════════════════════════════════════════════════
const GENRES = [
  {label:'🎲 Aleatório', query:''},
  {label:'Rock',         query:'rock'},
  {label:'Jazz',         query:'jazz'},
  {label:'Hip-Hop',      query:'hip-hop'},
  {label:'Eletrônico',   query:'electronic'},
  {label:'Pop',          query:'pop'},
  {label:'Soul/R&B',     query:'soul r&b'},
  {label:'Metal',        query:'metal'},
  {label:'Folk/Indie',   query:'folk indie'},
  {label:'Clássico',     query:'classical'},
  {label:'Blues',        query:'blues'},
  {label:'Country',      query:'country'},
  {label:'Reggae',       query:'reggae'},
  {label:'Funk',         query:'funk'},
  {label:'Punk',         query:'punk'},
  {label:'Alternativo',  query:'alternative'},
  {label:'Bossa Nova',   query:'bossa nova'},
  {label:'Samba',        query:'samba'},
  {label:'MPB',          query:'mpb'},
  {label:'Forró',        query:'forro'},
  {label:'Axé / Baile',  query:'axe baile funk'},
  {label:'Gospel',       query:'gospel'},
  {label:'Ambient',      query:'ambient'},
  {label:'Lo-fi',        query:'lo-fi hip hop'},
  {label:'Grunge',       query:'grunge'},
  {label:'New Wave',     query:'new wave'},
  {label:'Disco',        query:'disco'},
  {label:'Trap',         query:'trap'},
  {label:'K-Pop',        query:'k-pop'},
  {label:'Sertanejo',    query:'sertanejo'},
];

let selectedGenre = GENRES[0];
let allGenreChips = [];

function buildGenreChips() {
  const wrap = document.getElementById('genre-chips');
  wrap.innerHTML = '';
  GENRES.forEach((g, i) => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (i === 0 ? ' active' : '');
    btn.textContent = g.label;
    btn.dataset.idx = i;
    btn.onclick = () => {
      allGenreChips.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedGenre = g;
    };
    wrap.appendChild(btn);
    allGenreChips.push(btn);
  });
}

function filterGenreChips(val) {
  const q = val.toLowerCase().trim();
  allGenreChips.forEach(btn => {
    btn.style.display = (!q || btn.textContent.toLowerCase().includes(q)) ? '' : 'none';
  });
}

// ═══════════════════════════════════════════════════
//  CHIP SELECTION
// ═══════════════════════════════════════════════════
let filters = {
  durMin: 0, durMax: 9999,
  type: '',
  eraFrom: 1900, eraTo: 2099,
  exclude: false,
  popular: false,
};

function selectChip(el, group) {
  const parent = document.getElementById(group + '-chips');
  parent.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  if (group === 'dur')  { filters.durMin = +el.dataset.min; filters.durMax = +el.dataset.max; }
  if (group === 'type') { filters.type   = el.dataset.val; }
  if (group === 'era')  { filters.eraFrom = +el.dataset.from; filters.eraTo = +el.dataset.to; }
}

function toggleExclude(el) {
  filters.exclude = !filters.exclude;
  el.classList.toggle('active', filters.exclude);
}

function toggleChipToggle(el, key) {
  filters[key] = !filters[key];
  el.classList.toggle('active', filters[key]);
}

// ═══════════════════════════════════════════════════
//  HISTORY + RATINGS (localStorage)
// ═══════════════════════════════════════════════════
function getHistory() {
  try { return JSON.parse(localStorage.getItem('spinrec_history') || '[]'); } catch(e) { return []; }
}
function saveHistory(h) { localStorage.setItem('spinrec_history', JSON.stringify(h)); }

function addToHistory(album) {
  let h = getHistory();
  const idx = h.findIndex(a => a.id === album.id);
  if (idx === -1) {
    h.unshift({ ...album, rating: 0, listened: false, addedAt: Date.now() });
  }
  saveHistory(h);
  updateStats();
}

function setListened(albumId, val) {
  let h = getHistory();
  const it = h.find(a => a.id === albumId);
  if (it) it.listened = val;
  saveHistory(h);
  updateStats();
}

function setRating(albumId, stars) {
  let h = getHistory();
  const it = h.find(a => a.id === albumId);
  if (it) it.rating = stars;
  saveHistory(h);
  renderHistory();
}

function clearHistory() {
  if (!confirm('Limpar todo o histórico?')) return;
  localStorage.removeItem('spinrec_history');
  updateStats();
  renderHistory();
}

function updateStats() {
  const h = getHistory();
  const listened = h.filter(a => a.listened).length;
  document.getElementById('stat-listened').textContent = listened;
  document.getElementById('listened-badge').textContent = listened + ' escutados';
}

// ═══════════════════════════════════════════════════
//  SPIN LOGIC
// ═══════════════════════════════════════════════════
let spinCount = 0;
let currentAlbum = null;

const FALLBACK_QUERIES = [
  'best albums 2020', 'classic rock albums', 'jazz essential', 'indie gems',
  'electronic artists', 'hip hop classics', 'soul legends', 'pop hits'
];

async function spin() {
  const btn = document.getElementById('spin-btn');
  btn.disabled = true;

  showLoading(true);
  hideResult();

  try {
    const album = await fetchRandomAlbum();
    if (!album) {
      showError('Nenhum álbum encontrado com esses filtros. Tente ajustar os parâmetros.');
      return;
    }
    currentAlbum = album;
    spinCount++;
    document.getElementById('stat-spins').textContent = spinCount;
    addToHistory(album);
    renderAlbumCard(album);
    document.getElementById('result-section').classList.add('visible');
    document.getElementById('result-section').style.display = 'block';
    document.getElementById('result-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch(err) {
    console.error(err);
    showError('Erro ao conectar ao Spotify. Verifique sua conexão e tente novamente.<br><small>' + err.message + '</small>');
  } finally {
    showLoading(false);
    btn.disabled = false;
  }
}

async function fetchRandomAlbum() {
  const token = await getToken();
  const history = getHistory();
  const listenedIds = history.filter(a => a.listened).map(a => a.id);
  const historyIds  = history.map(a => a.id);

  // Build search query
  let baseQuery = selectedGenre.query || pickRandom(FALLBACK_QUERIES);
  
  // Add era filter
  const eraStr = buildYearFilter();
  if (eraStr) baseQuery += ' ' + eraStr;

  // Add type
  const typeStr = filters.type ? `&type=${filters.type}` : '&type=album';

  // Popularity: use different offset strategies
  const maxOffset = filters.popular ? 5 : 45;
  const offset = Math.floor(Math.random() * maxOffset);
  const limit  = 50;

  const encodedQ = encodeURIComponent(baseQuery);
  const url = `/search?q=${encodedQ}${typeStr}&limit=${limit}&offset=${offset}`;

  const data = await spotifyFetch(url);
  let items = (data.albums || data.singles || {}).items || [];

  // Filter by year
  items = items.filter(it => {
    if (!it || !it.release_date) return false;
    const yr = parseInt(it.release_date.substring(0,4));
    return yr >= filters.eraFrom && yr <= filters.eraTo;
  });

  // Exclude listened
  if (filters.exclude) {
    items = items.filter(it => !listenedIds.includes(it.id));
  }

  if (items.length === 0) return null;

  // Pick random from results
  let candidates = items.filter(it => !historyIds.includes(it.id));
  if (candidates.length === 0) candidates = items;
  
  const pick = pickRandom(candidates);

  // Fetch full album details (with tracks)
  const full = await spotifyFetch(`/albums/${pick.id}`);

  // Calculate duration
  const durationMs = full.tracks.items.reduce((s, t) => s + (t.duration_ms || 0), 0);
  const durationMin = Math.round(durationMs / 60000);

  // Duration filter
  if (filters.durMax !== 9999) {
    if (durationMin > filters.durMax || durationMin < filters.durMin) {
      // Try a few more
      for (let attempt = 0; attempt < 6; attempt++) {
        const alt = pickRandom(candidates);
        const altFull = await spotifyFetch(`/albums/${alt.id}`);
        const altMs = altFull.tracks.items.reduce((s, t) => s + (t.duration_ms || 0), 0);
        const altMin = Math.round(altMs / 60000);
        if (altMin >= filters.durMin && altMin <= filters.durMax) {
          return normalizeAlbum(altFull, altMin);
        }
      }
      return null;
    }
  }

  return normalizeAlbum(full, durationMin);
}

function normalizeAlbum(full, durationMin) {
  return {
    id: full.id,
    name: full.name,
    artist: full.artists.map(a => a.name).join(', '),
    year: full.release_date ? full.release_date.substring(0,4) : '?',
    type: full.album_type,
    tracks: full.tracks.items.map(t => ({
      name: t.name,
      duration_ms: t.duration_ms,
      track_number: t.track_number,
    })),
    totalTracks: full.total_tracks,
    durationMin,
    image: full.images[0]?.url || '',
    genres: full.genres || [],
    popularity: full.popularity || 0,
    spotifyUrl: full.external_urls?.spotify || '',
    label: full.label || '',
  };
}

function buildYearFilter() {
  const { eraFrom, eraTo } = filters;
  if (eraFrom <= 1900 && eraTo >= 2099) return '';
  return `year:${eraFrom}-${eraTo}`;
}

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ═══════════════════════════════════════════════════
//  RENDER ALBUM CARD
// ═══════════════════════════════════════════════════
function renderAlbumCard(album) {
  const h = getHistory();
  const entry = h.find(a => a.id === album.id) || {};
  const rating   = entry.rating   || 0;
  const listened = entry.listened || false;

  const typeLabel = album.type === 'album' ? 'ÁLBUM' : album.type === 'single' ? 'SINGLE/EP' : album.type.toUpperCase();
  const genreStr  = album.genres.length ? album.genres.slice(0,2).join(' · ') : 'Spotify';

  const wrap = document.getElementById('album-card-wrap');
  wrap.innerHTML = `
    <div class="album-card">
      <div class="cover-wrap">
        <img src="${escHtml(album.image)}" alt="${escHtml(album.name)}" loading="lazy">
        <div class="vinyl-shadow"></div>
        <span class="type-badge">${typeLabel}</span>
      </div>
      <div class="album-info">
        <div class="album-info-top">
          <div class="album-genre">${escHtml(genreStr)}</div>
          <div class="album-title">${escHtml(album.name)}</div>
          <div class="album-artist">${escHtml(album.artist)}</div>
          <div class="album-meta">
            <span><span class="dot"></span>${album.year}</span>
            <span><span class="dot"></span>${album.totalTracks} faixas</span>
            <span><span class="dot"></span>${album.durationMin} min</span>
            ${album.label ? `<span><span class="dot"></span>${escHtml(album.label)}</span>` : ''}
          </div>
        </div>

        <div>
          <div class="rating-section">
            <div class="rating-label-text">Sua avaliação</div>
            ${buildStarWidget(album.id, rating)}
          </div>

          <div class="album-actions">
            <button class="btn btn-listen ${listened ? 'marked' : ''}" id="btn-listen-${album.id}"
              onclick="toggleListened('${album.id}', this)">
              ${listened ? '✓ Escutado' : '+ Marcar como escutado'}
            </button>
            ${album.spotifyUrl ? `<a class="btn btn-spotify spotify-pulse" href="${album.spotifyUrl}" target="_blank" rel="noopener">▶ Abrir no Spotify</a>` : ''}
            <button class="btn btn-again" onclick="spin()">⟳ Outro álbum</button>
          </div>

          <div class="tracklist-section">
            <button class="tracklist-toggle" onclick="toggleTracklist(this)">
              <span class="arrow">▶</span> Ver tracklist
            </button>
            <div class="track-list">
              ${album.tracks.map(t => `
                <div class="track-row">
                  <span class="track-num">${t.track_number}</span>
                  <span class="track-name">${escHtml(t.name)}</span>
                  <span class="track-dur">${fmtMs(t.duration_ms)}</span>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════
//  HALF-STAR WIDGET
// ═══════════════════════════════════════════════════
function buildStarWidget(albumId, currentRating) {
  let html = `<div class="stars-container" id="stars-${albumId}">`;
  for (let i = 1; i <= 5; i++) {
    let cls = '';
    if (currentRating >= i)        cls = 'full';
    else if (currentRating >= i - 0.5) cls = 'half';
    html += `
      <div class="star-unit ${cls}" id="star-${albumId}-${i}">
        <div class="star-bg">★</div>
        <div class="star-filled-left">★</div>
        <div class="star-filled-right">★</div>
        <div class="star-left"
          onmouseover="previewRating('${albumId}', ${i - 0.5})"
          onmouseout="resetPreview('${albumId}')"
          onclick="commitRating('${albumId}', ${i - 0.5})"></div>
        <div class="star-right"
          onmouseover="previewRating('${albumId}', ${i})"
          onmouseout="resetPreview('${albumId}')"
          onclick="commitRating('${albumId}', ${i})"></div>
      </div>`;
  }
  const valLabel = currentRating ? currentRating.toFixed(1) : '—';
  html += `<span class="rating-value-display" id="rating-val-${albumId}">${valLabel}</span>`;
  html += `</div>`;
  return html;
}

function previewRating(albumId, val) {
  updateStarDisplay(albumId, val);
  const disp = document.getElementById('rating-val-' + albumId);
  if (disp) disp.textContent = val.toFixed(1);
}

function resetPreview(albumId) {
  const h = getHistory();
  const entry = h.find(a => a.id === albumId);
  const rating = entry ? entry.rating : 0;
  updateStarDisplay(albumId, rating);
  const disp = document.getElementById('rating-val-' + albumId);
  if (disp) disp.textContent = rating ? rating.toFixed(1) : '—';
}

function commitRating(albumId, val) {
  setRating(albumId, val);
  updateStarDisplay(albumId, val);
  const disp = document.getElementById('rating-val-' + albumId);
  if (disp) disp.textContent = val.toFixed(1);
}

function updateStarDisplay(albumId, val) {
  for (let i = 1; i <= 5; i++) {
    const unit = document.getElementById(`star-${albumId}-${i}`);
    if (!unit) continue;
    unit.classList.remove('full','half');
    if (val >= i)            unit.classList.add('full');
    else if (val >= i - 0.5) unit.classList.add('half');
  }
}

function toggleListened(albumId, btn) {
  const h = getHistory();
  const entry = h.find(a => a.id === albumId);
  const newVal = entry ? !entry.listened : true;
  setListened(albumId, newVal);
  btn.textContent = newVal ? '✓ Escutado' : '+ Marcar como escutado';
  btn.classList.toggle('marked', newVal);
  renderHistory();
}

function toggleTracklist(btn) {
  btn.classList.toggle('open');
  const list = btn.nextElementSibling;
  list.classList.toggle('open');
  const isOpen = list.classList.contains('open');
  btn.querySelector('.arrow').parentElement.querySelector('.arrow').textContent = isOpen ? '▼' : '▶';
  btn.childNodes[1].textContent = isOpen ? ' Ocultar tracklist' : ' Ver tracklist';
}

// ═══════════════════════════════════════════════════
//  HISTORY PANEL
// ═══════════════════════════════════════════════════
let historyOpen = false;

function toggleHistory() {
  historyOpen = !historyOpen;
  const sec = document.getElementById('history-section');
  const d1  = document.getElementById('div1');
  const btn = document.getElementById('history-toggle-btn');
  sec.classList.toggle('open', historyOpen);
  d1.style.display  = historyOpen ? '' : 'none';
  btn.classList.toggle('active', historyOpen);
  if (historyOpen) renderHistory();
}

function renderHistory() {
  const grid = document.getElementById('history-grid');
  const h    = getHistory();
  if (!h.length) {
    grid.innerHTML = `<div class="empty-state">Nenhum álbum escutado ainda. Gire o disco!</div>`;
    return;
  }
  grid.innerHTML = h.map(a => `
    <div class="history-item" onclick="reloadAlbum('${a.id}')">
      <img src="${escHtml(a.image)}" alt="${escHtml(a.name)}" loading="lazy">
      ${a.listened ? '<span class="listened-badge">✓</span>' : ''}
      <div class="history-meta">
        <div class="history-title">${escHtml(a.name)}</div>
        <div class="history-artist">${escHtml(a.artist)}</div>
        <div class="history-stars-row">${renderHistoryStars(a.rating)}</div>
      </div>
    </div>
  `).join('');
}

function renderHistoryStars(rating) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    if (rating >= i)           html += `<span class="h-star">★</span>`;
    else if (rating >= i-0.5)  html += `<span class="h-star">⯨</span>`;
    else                       html += `<span class="h-star empty">★</span>`;
  }
  return html;
}

async function reloadAlbum(albumId) {
  showLoading(true);
  hideResult();
  try {
    const full = await spotifyFetch(`/albums/${albumId}`);
    const durationMs = full.tracks.items.reduce((s, t) => s + (t.duration_ms || 0), 0);
    const durationMin = Math.round(durationMs / 60000);
    currentAlbum = normalizeAlbum(full, durationMin);
    renderAlbumCard(currentAlbum);
    document.getElementById('result-section').style.display = 'block';
    document.getElementById('result-section').classList.add('visible');
    document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
  } catch(e) {
    showError('Erro ao carregar álbum do histórico.');
  } finally {
    showLoading(false);
  }
}

// ═══════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════
function showLoading(on) {
  document.getElementById('loading-wrap').style.display = on ? 'block' : 'none';
}

function hideResult() {
  const rs = document.getElementById('result-section');
  rs.style.display = 'none';
  rs.classList.remove('visible');
}

function showError(msg) {
  const rs = document.getElementById('result-section');
  rs.style.display = 'block';
  document.getElementById('album-card-wrap').innerHTML = `<div class="notice"><strong>Ops!</strong><br>${msg}</div>`;
}

function fmtMs(ms) {
  if (!ms) return '—';
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
buildGenreChips();
updateStats();
</script>
